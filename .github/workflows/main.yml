name: qemu-hvf-test

on:
workflow_dispatch:

permissions:
contents: write

jobs:
test:
runs-on: macos-latest
steps:
- uses: actions/checkout@v4

```
  - name: Install QEMU
    run: |
      brew update
      brew install qemu

  - name: Test HVF with QEMU ARM
    run: |
      FILE=hvf_test.txt
      echo "=== QEMU HVF TEST ===" > $FILE
      echo "" >> $FILE

      echo "CPU:" >> $FILE
      sysctl -n machdep.cpu.brand_string 2>/dev/null >> $FILE || echo "Apple Silicon" >> $FILE
      echo "" >> $FILE

      echo "QEMU version:" >> $FILE
      qemu-system-aarch64 --version >> $FILE
      echo "" >> $FILE

      echo "Running HVF test..." >> $FILE
      qemu-system-aarch64 \
        -machine virt \
        -accel hvf \
        -cpu host \
        -m 512 \
        -nographic \
        -S \
        2>> $FILE || true

      echo "" >> $FILE
      echo "If HVF works you will see hvf accelerator initialized." >> $FILE

  - name: Commit result
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add hvf_test.txt
      git commit -m "hvf test result [skip ci]" || echo "no changes"
      git push
```
