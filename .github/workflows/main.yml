name: mac-runner-info

on:
workflow_dispatch

permissions:
contents: write

jobs:
info:
runs-on: macos-latest
steps:
- uses: actions/checkout@v4

```
  - name: Collect machine info
    run: |
      FILE=machine_info.txt
      echo "=== MACHINE INFO ===" > $FILE
      echo "" >> $FILE

      echo "=== RAM ===" >> $FILE
      used=$(vm_stat | awk '/Pages active/ {a=$3} /Pages wired/ {b=$3} /Pages speculative/ {c=$3} END {print (a+b+c)*4096/1024/1024}')
      total=$(sysctl -n hw.memsize)
      total=$(echo "$total/1024/1024" | bc)
      echo "RAM used: ${used} MB" >> $FILE
      echo "RAM total: ${total} MB" >> $FILE
      echo "" >> $FILE

      echo "=== DISK ===" >> $FILE
      df -h >> $FILE
      echo "" >> $FILE

      echo "=== DISK LIST ===" >> $FILE
      diskutil list >> $FILE
      echo "" >> $FILE

      echo "=== HVF CHECK ===" >> $FILE
      if sysctl kern.hv_support >/dev/null 2>&1; then
        sysctl kern.hv_support >> $FILE
      else
        echo "HVF sysctl not available" >> $FILE
      fi

  - name: Commit result
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add machine_info.txt
      git commit -m "runner machine info [skip ci]" || echo "no changes"
      git push
```
