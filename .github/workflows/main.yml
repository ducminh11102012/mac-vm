name: mac-gpu-info

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gpu:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Collect GPU info
        run: |
          FILE=gpu_info.txt
          echo "=== GPU INFO ===" > $FILE
          echo "" >> $FILE

          echo "=== system_profiler ===" >> $FILE
          system_profiler SPDisplaysDataType >> $FILE
          echo "" >> $FILE

          echo "=== ioreg GPU ===" >> $FILE
          ioreg -l | grep -i "gpu" >> $FILE || true
          echo "" >> $FILE

          echo "=== PCI devices ===" >> $FILE
          system_profiler SPPCIDataType >> $FILE

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gpu_info.txt
          git commit -m "gpu info [skip ci]" || echo "no changes"
          git push
